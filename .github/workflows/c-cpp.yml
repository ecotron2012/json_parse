name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: install CUnit
      run: sudo apt-get install libcunit1 libcunit1-doc libcunit1-dev
    - name: configure
      run: make build/lib build/test
    - name: run tests with CUnit
      run: make run/test
    - name: report results
      run: |
        bash ./generate_result_log.sh
        echo "# Test results" >> $GITHUB_STEP_SUMMARY
        cat ./results.md >> $GITHUB_STEP_SUMMARY
      working-directory: ./tests

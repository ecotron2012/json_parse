name: C/C++ CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: install CUnit
      run: sudo apt-get install libcunit1 libcunit1-doc libcunit1-dev
    - name: configure
      run: make build/lib build/test
    - name: run tests with CUnit
      run: make run/test
